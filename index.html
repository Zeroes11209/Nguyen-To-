<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Album Nâng Cấp</title>

<style>
:root{
  --bg:#0b0f16;
  --card:#121826;
  --text:white;
  --accent:#2563eb;
  --muted:#a5b4fc;
}

/* LIGHT MODE */
.light{
  --bg:#f2f2f2;
  --card:white;
  --text:#111;
  --accent:#0066ff;
  --muted:#444;
}

body{
  margin:0;
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:var(--card);
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  z-index:10;
}

/* TOOLBAR */
.toolbar{
  display:flex;
  gap:8px;
  padding:10px;
  background:var(--card);
  overflow-x:auto;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:18px;
  background:var(--accent);
  color:white;
  font-weight:600;
}

/* ===== THANH THƯ MỤC (BẢN GỌN GÀNG MỚI) ===== */
#folders{
  display:flex;
  gap:14px;              /* khoảng cách giữa các thư mục */
  padding:12px 10px;     /* tạo không gian thoáng */
  overflow-x:auto;
  align-items:center;
  background:var(--card);
  margin-bottom:8px;     /* tách nhẹ với phần ảnh bên dưới */
  border-bottom:1px solid rgba(255,255,255,.08);
}

/* Nút thư mục đẹp hơn */
#folders button{
  min-width:110px;       /* mỗi thư mục đủ rộng để nhìn rõ */
  padding:10px 12px;
  border-radius:16px;
  background:#1a2233;
  color:white;
  border:1px solid rgba(255,255,255,.08);
}

/* Thư mục đang chọn nổi bật hơn */
#folders button.active{
  background:#10b981 !important;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:4px;
  padding:6px;
}

.grid img,
.grid video{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
  background:black;
  cursor:pointer;
  position:relative;
}

/* ICON YÊU THÍCH */
.star{
  position:absolute;
  bottom:6px;
  right:6px;
  font-size:18px;
  color:gold;
  text-shadow:0 0 4px black;
}

/* THÙNG RÁC TITLE */
.trash-title{
  margin:12px;
  color:#ff7777;
  font-weight:600;
}

/* FULLSCREEN VIEWER */
#viewer{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}
#viewer img, #viewer video{
  max-width:100%;
  max-height:100%;
}
#viewer .close{
  position:absolute;
  top:20px;
  right:20px;
  color:white;
  font-size:24px;
}
</style>
</head>

<body>

<div class="header">
  <span>📷 Album Riêng</span>
  <button onclick="toggleMode()">🌙</button>
</div>

<div class="toolbar">
  <button onclick="newFolder()">➕ Thư mục</button>
  <button onclick="setView('day')">Ngày</button>
  <button onclick="setView('month')">Tháng</button>
  <button onclick="setView('year')">Năm</button>
  <button onclick="showFavorites()">⭐ Yêu thích</button>
  <button onclick="showTrash()">🗑️ Thùng rác</button>
  <button onclick="showNormal()">📁 Album</button>
</div>

<div id="folders"></div>

<div style="padding:10px">
  <input type="file" id="fileInput" accept="image/*,video/*" multiple>
  <button onclick="saveFiles()">Lưu vào thư mục đang chọn</button>
</div>

<div id="feed"></div>

<!-- FULLSCREEN VIEWER -->
<div id="viewer" onclick="closeViewer()">
  <span class="close">✖</span>
  <img id="viewImg">
  <video id="viewVid" controls autoplay></video>
</div>

<script>
let db;
let currentFolder = "Mặc định";
let viewMode = "day";
let mode = "normal"; // normal | fav | trash

const request = indexedDB.open("PrivateAlbumDB",1);

request.onupgradeneeded = e=>{
  db = e.target.result;
  if(!db.objectStoreNames.contains("media")){
    db.createObjectStore("media",{keyPath:"id",autoIncrement:true});
  }
  if(!db.objectStoreNames.contains("folders")){
    db.createObjectStore("folders",{keyPath:"name"});
  }
};

request.onsuccess = e=>{
  db = e.target.result;
  loadFolders();
  loadFeed();
};

function todayParts(){
  const d = new Date();
  return {
    day: d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear(),
    month: (d.getMonth()+1)+"/"+d.getFullYear(),
    year: d.getFullYear().toString()
  };
}

// ===== THƯ MỤC =====
function newFolder(){
  let name = prompt("Tên thư mục:");
  if(!name) return;
  let tx = db.transaction("folders","readwrite");
  tx.objectStore("folders").put({name});
  tx.oncomplete = loadFolders;
}

function loadFolders(){
  let box = document.getElementById("folders");
  box.innerHTML="";
  addFolderBtn("Mặc định");

  let tx = db.transaction("folders","readonly");
  tx.objectStore("folders").openCursor().onsuccess = e=>{
    let c = e.target.result;
    if(c){
      addFolderBtn(c.value.name);
      c.continue();
    }
  };
}

lfunction addFolderBtn(name){
  let b = document.createElement("button");
  b.innerText = "📁 "+name;

  if(name===currentFolder){
    b.classList.add("active");
  }

  b.onclick=()=>{
    currentFolder=name;
    mode="normal";
    loadFeed();
    loadFolders(); // làm mới để đổi màu thư mục đang chọn
  };

  folders.appendChild(b);
}

// ===== LƯU FILE =====
function saveFiles(){
  let files = fileInput.files;
  let parts = todayParts();
  let tx = db.transaction("media","readwrite");
  let store = tx.objectStore("media");

  let count = files.length;
  for(let f of files){
    let r = new FileReader();
    r.onload = e=>{
      store.add({
        type:f.type,
        src:e.target.result,
        folder:currentFolder,
        day:parts.day,
        month:parts.month,
        year:parts.year,
        time:Date.now(),
        fav:false,
        deleted:false
      });
      if(--count===0) tx.oncomplete = loadFeed;
    };
    r.readAsDataURL(f);
  }
}

// ===== CÁC CHẾ ĐỘ XEM =====
function showFavorites(){ mode="fav"; loadFeed(); }
function showTrash(){ mode="trash"; loadFeed(); }
function showNormal(){ mode="normal"; loadFeed(); }
function setView(v){ viewMode=v; loadFeed(); }

// ===== HIỂN THỊ =====
function loadFeed(){
  let tx = db.transaction("media","readonly");
  let store = tx.objectStore("media");
  let feed = document.getElementById("feed");
  feed.innerHTML="";

  let data=[];
  store.openCursor().onsuccess = e=>{
    let c = e.target.result;
    if(c){
      data.push(c.value);
      c.continue();
    }else{
      data.sort((a,b)=>b.time-a.time);

      let filtered = data.filter(it=>{
        if(mode==="fav") return it.fav && !it.deleted;
        if(mode==="trash") return it.deleted;
        return !it.deleted && it.folder===currentFolder;
      });

      let key = viewMode;
      let groups={};

      filtered.forEach(it=>{
        let k = it[key];
        if(!groups[k]) groups[k]=[];
        groups[k].push(it);
      });

      Object.keys(groups).reverse().forEach(k=>{
        let title = document.createElement("div");
        title.className="day-title";
        title.innerText = k + (mode==="trash" ? " (Thùng rác)" : "");
        feed.appendChild(title);

        let grid = document.createElement("div");
        grid.className="grid";

        groups[k].forEach(it=>{
          let wrapper = document.createElement("div");
          wrapper.style.position="relative";

          let el;
          if(it.type.startsWith("image")){
            el = document.createElement("img");
            el.src = it.src;
          }else{
            el = document.createElement("video");
            el.src = it.src;
            el.autoplay=true;
          }

          el.onclick = ()=>openViewer(it);

          // ⭐ Nút yêu thích
          let star = document.createElement("div");
          star.innerText = it.fav ? "⭐" : "☆";
          star.className="star";
          star.onclick = e=>{
            e.stopPropagation();
            toggleFav(it.id);
          };

          // 🗑️ Nút xóa
          let del = document.createElement("button");
          del.innerText = mode==="trash" ? "♻️ Khôi phục" : "🗑️";
          del.style.position="absolute";
          del.style.top="6px";
          del.style.right="6px";
          del.style.padding="4px 6px";
          del.onclick = e=>{
            e.stopPropagation();
            mode==="trash" ? restore(it.id) : trash(it.id);
          };

          wrapper.appendChild(el);
          wrapper.appendChild(star);
          wrapper.appendChild(del);
          grid.appendChild(wrapper);
        });

        feed.appendChild(grid);
      });
    }
  };
}

// ===== YÊU THÍCH =====
function toggleFav(id){
  let tx = db.transaction("media","readwrite");
  let store = tx.objectStore("media");
  store.get(id).onsuccess = e=>{
    let item = e.target.result;
    item.fav = !item.fav;
    store.put(item);
    tx.oncomplete = loadFeed;
  };
}

// ===== THÙNG RÁC =====
function trash(id){
  let tx = db.transaction("media","readwrite");
  let store = tx.objectStore("media");
  store.get(id).onsuccess = e=>{
    let item = e.target.result;
    item.deleted = true;
    store.put(item);
    tx.oncomplete = loadFeed;
  };
}

function restore(id){
  let tx = db.transaction("media","readwrite");
  let store = tx.objectStore("media");
  store.get(id).onsuccess = e=>{
    let item = e.target.result;
    item.deleted = false;
    store.put(item);
    tx.oncomplete = loadFeed;
  };
}

// ===== LIGHT/DARK =====
function toggleMode(){
  document.body.classList.toggle("light");
}

// ===== FULLSCREEN =====
function openViewer(it){
  viewer.style.display="flex";
  if(it.type.startsWith("image")){
    viewImg.style.display="block";
    viewVid.style.display="none";
    viewImg.src = it.src;
  }else{
    viewImg.style.display="none";
    viewVid.style.display="block";
    viewVid.src = it.src;
    viewVid.play();
  }
}
function closeViewer(){
  viewer.style.display="none";
  viewVid.pause();
}
</script>
</body>
</html>
